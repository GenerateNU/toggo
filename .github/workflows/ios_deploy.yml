name: Deploy iOS

on:
  pull_request:
    branches: [main]
    types: [closed]
    paths:
      - "frontend/**"

jobs:
  deploy:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    uses: GenerateNU/shiperate/.github/workflows/ios-deploy.yml@main
    with:
      env: "node"
    secrets: inherit